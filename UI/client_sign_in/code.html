<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&amp;family=Space+Grotesk:wght@600&amp;family=Inter:wght@400;500;600&amp;family=Space+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-headline {
            font-family: 'Space Grotesk', sans-serif;
        }
        .font-display {
            font-family: 'Barlow Condensed', sans-serif;
        }
        .font-mono {
            font-family: 'Space Mono', monospace;
        }
        /* Custom Vinyl Ring Graphic using CSS */
        .vinyl-rings {
            background: repeating-radial-gradient(
                circle at center,
                transparent 0,
                transparent 40px,
                rgba(143, 214, 255, 0.04) 41px,
                transparent 42px
            );
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "surface-container": "#1f1f27",
                "primary-fixed-dim": "#7ad0ff",
                "surface": "#13131a",
                "on-error": "#690005",
                "surface-variant": "#34343c",
                "on-tertiary-fixed-variant": "#920027",
                "surface-container-low": "#1b1b23",
                "inverse-on-surface": "#303038",
                "tertiary-fixed": "#ffdada",
                "surface-container-high": "#2a2931",
                "primary": "#8fd6ff",
                "on-surface-variant": "#bcc8d1",
                "on-secondary": "#452b00",
                "on-surface": "#e4e1ec",
                "on-secondary-fixed": "#291800",
                "primary-fixed": "#c3e8ff",
                "tertiary": "#ffbdbf",
                "outline": "#87929b",
                "secondary-container": "#dc9100",
                "on-primary-fixed": "#001e2c",
                "secondary": "#ffb955",
                "tertiary-fixed-dim": "#ffb3b5",
                "surface-container-highest": "#34343c",
                "on-tertiary-fixed": "#40000c",
                "surface-bright": "#393841",
                "on-tertiary": "#680019",
                "surface-container-lowest": "#0e0d15",
                "secondary-fixed-dim": "#ffb955",
                "on-secondary-fixed-variant": "#633f00",
                "on-primary": "#003549",
                "surface-dim": "#13131a",
                "on-background": "#e4e1ec",
                "outline-variant": "#3d4850",
                "error-container": "#93000a",
                "on-secondary-container": "#4f3100",
                "on-primary-fixed-variant": "#004c69",
                "primary-container": "#00bfff",
                "secondary-fixed": "#ffddb4",
                "inverse-surface": "#e4e1ec",
                "background": "#13131a",
                "error": "#ffb4ab",
                "surface-tint": "#7ad0ff",
                "on-primary-container": "#004a65",
                "tertiary-container": "#ff9399",
                "on-tertiary-container": "#8d0025",
                "inverse-primary": "#00668a",
                "on-error-container": "#ffdad6"
              },
              fontFamily: {
                "headline": ["Space Grotesk"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }
      </script>
</head>
<body class="bg-surface text-on-surface min-h-screen selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- Background Layering -->
<div class="fixed inset-0 z-0">
<!-- Main Gradient Background -->
<div class="absolute inset-0 bg-gradient-to-br from-surface via-surface-container-lowest to-surface"></div>
<!-- Vinyl Rings Overlay -->
<div class="absolute inset-0 vinyl-rings opacity-60"></div>
<!-- Center Glow behind card -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Main Content Wrapper (Canvas) -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 py-12">
<!-- Center Sign-In Card -->
<div class="w-full max-w-[440px] bg-white/[0.03] backdrop-blur-2xl rounded-[24px] p-10 border border-white/5 shadow-2xl">
<!-- Header Section -->
<div class="flex flex-col items-center text-center mb-8">
<!-- KC Logo Mark -->
<div class="mb-6 flex items-center justify-center w-12 h-12 rounded-full bg-primary-container/20 border border-primary/20">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">album</span>
</div>
<h1 class="font-headline text-[26px] font-semibold text-white tracking-tight mb-2">Welcome Back.</h1>
<p class="text-[14px] text-on-surface-variant leading-relaxed">
                    Sign in to access your playlist portal and bookings.
                </p>
</div>
<!-- Form -->
<form class="space-y-5" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-[52px] bg-surface-container-low border-0 focus:ring-1 focus:ring-primary rounded-lg pl-12 pr-4 text-[15px] text-white placeholder:text-on-surface-variant/50 transition-all" placeholder="Email address" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px] group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-[52px] bg-surface-container-low border-0 focus:ring-1 focus:ring-primary rounded-lg pl-12 pr-12 text-[15px] text-white placeholder:text-on-surface-variant/50 transition-all" placeholder="Password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-[13px] text-primary hover:text-primary-fixed-dim font-medium transition-colors" href="#">Forgot your password?</a>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-[46px] bg-primary-container text-on-primary-container font-semibold rounded-sm hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-8 border-t border-white/5 text-center space-y-4">
<p class="text-[14px] text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary hover:underline font-medium ml-1" href="#">Create one →</a>
</p>
<div class="pt-2">
<a class="font-mono text-[11px] uppercase tracking-widest text-primary/60 hover:text-primary transition-colors flex items-center justify-center gap-2" href="#">
<span class="material-symbols-outlined text-[14px]">admin_panel_settings</span>
                        Admin login →
                    </a>
</div>
</div>
</div>
<!-- System Branding (Fixed Bottom Right for polish) -->
<div class="fixed bottom-8 right-8 pointer-events-none opacity-20">
<span class="font-display text-4xl italic text-white tracking-tighter">KillerCutz</span>
</div>
</main>
<!-- Decorative Corner Element -->
<div class="fixed top-0 left-0 p-12 pointer-events-none opacity-10">
<div class="w-32 h-32 border-l border-t border-primary"></div>
</div>
<div class="fixed bottom-0 right-0 p-12 pointer-events-none opacity-10">
<div class="w-32 h-32 border-r border-b border-primary"></div>
</div>
</body></html>
