<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&amp;family=Space+Grotesk:wght@600&amp;family=Inter:wght@400;500&amp;family=Space+Mono&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
        }
        .hero-font {
            font-family: 'Barlow Condensed', sans-serif;
        }
        .mono-font {
            font-family: 'Space Mono', monospace;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .hardware-gradient {
            background: linear-gradient(135deg, #00bfff 0%, #0088ff 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "surface-tint": "#7ad0ff",
                        "on-primary-container": "#004a65",
                        "secondary": "#ffb955",
                        "error-container": "#93000a",
                        "tertiary": "#ffbdbf",
                        "surface-container-low": "#1b1b23",
                        "surface-container": "#1f1f27",
                        "surface": "#13131a",
                        "primary": "#00bfff",
                        "on-tertiary-container": "#8d0025",
                        "inverse-primary": "#00668a",
                        "surface-bright": "#393841",
                        "on-error": "#690005",
                        "surface-variant": "#34343c",
                        "on-primary-fixed-variant": "#004c69",
                        "surface-container-highest": "#34343c",
                        "outline-variant": "#3d4850",
                        "on-surface": "#e4e1ec",
                        "primary-container": "#00bfff",
                        "on-surface-variant": "#bcc8d1",
                        "surface-dim": "#13131a",
                        "on-secondary-container": "#4f3100",
                        "inverse-on-surface": "#303038",
                        "secondary-fixed": "#ffddb4",
                        "on-tertiary-fixed": "#40000c",
                        "on-primary": "#003549",
                        "tertiary-fixed-dim": "#ffb3b5",
                        "secondary-container": "#dc9100",
                        "on-tertiary-fixed-variant": "#920027",
                        "on-primary-fixed": "#001e2c",
                        "background": "#13131a",
                        "tertiary-fixed": "#ffdada",
                        "tertiary-container": "#ff9399",
                        "on-secondary-fixed-variant": "#633f00",
                        "outline": "#87929b",
                        "on-tertiary": "#680019",
                        "primary-fixed-dim": "#7ad0ff",
                        "surface-container-high": "#2a2931",
                        "on-secondary-fixed": "#291800",
                        "on-background": "#e4e1ec",
                        "surface-container-lowest": "#0e0d15",
                        "secondary-fixed-dim": "#ffb955",
                        "primary-fixed": "#c3e8ff",
                        "on-secondary": "#452b00",
                        "inverse-surface": "#e4e1ec"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem", 
                        "lg": "0.25rem", 
                        "xl": "0.5rem", 
                        "full": "0.75rem",
                        "24px": "1.5rem"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-surface-container to-background text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Atmospheric Background -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
<main class="relative z-10 w-full max-w-[440px]">
<!-- STEP 3: Set New Password -->
<section class="glass-card p-10 shadow-[0_40px_80px_rgba(0,0,0,0.3)] flex flex-col items-center rounded-24px" id="step-3">
<div class="mb-6 flex items-center justify-center w-14 h-14 bg-primary/20 rounded-full">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h2 class="text-[22px] font-semibold mb-2 text-white font-headline">Set a New Password</h2>
<p class="text-on-surface-variant text-sm mb-10 text-center">Make sure your new password is at least 12 characters long and complex.</p>
<form class="w-full space-y-6">
<!-- New Password Field -->
<div class="relative">
<label class="block text-[10px] font-medium text-on-surface-variant uppercase tracking-[0.2em] mb-2 px-1">New Password</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none focus:ring-1 focus:ring-primary text-on-surface py-3.5 px-4 rounded-sm transition-all outline-none pr-12" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Password Strength Indicator -->
<div class="space-y-3">
<div class="flex justify-between items-center px-1">
<span class="text-[11px] mono-font uppercase text-on-surface-variant tracking-wider">Strength</span>
<span class="text-[11px] mono-font uppercase text-[#4ADE80] tracking-wider font-bold">Strong</span>
</div>
<div class="flex gap-1 h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
<div class="w-full h-full flex gap-1">
<div class="h-full w-1/3 bg-[#EF4444]"></div>
<div class="h-full w-1/3 bg-[#FBBF24]"></div>
<div class="h-full w-1/3 bg-[#22C55E] shadow-[0_0_12px_rgba(34,197,94,0.4)]"></div>
</div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="relative">
<label class="block text-[10px] font-medium text-on-surface-variant uppercase tracking-[0.2em] mb-2 px-1">Confirm Password</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none focus:ring-1 focus:ring-primary text-on-surface py-3.5 px-4 rounded-sm transition-all outline-none pr-12" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full hardware-gradient text-white font-bold py-4 rounded-sm flex items-center justify-center gap-2 group transition-all active:scale-[0.98] shadow-[0_10px_20px_rgba(0,191,255,0.2)]" type="submit">
                    Update Password
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<p class="mt-8 text-[10px] mono-font text-on-surface-variant uppercase text-center opacity-40 tracking-widest">
                Success will redirect to dashboard
            </p>
</section>
</main>
<!-- Branding Accents (Optional, kept for character) -->
<div class="fixed bottom-8 left-8 hidden lg:block">
<div class="hero-font text-6xl text-white/5 font-black uppercase leading-none select-none">
            Sonic<br/>Futurism
        </div>
</div>
<div class="fixed top-8 right-8 hidden lg:block">
<div class="mono-font text-[10px] text-primary/40 flex flex-col items-end uppercase tracking-[0.2em]">
<span>System Reset Protocol</span>
<span>Ref: KC-440-PWD</span>
</div>
</div>
</body></html>
