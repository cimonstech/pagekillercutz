<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KillerCutz | Book the DJ</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=Space+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-container": "#ff9399",
                        "on-secondary-container": "#4f3100",
                        "background": "#13131a",
                        "on-primary-fixed": "#001e2c",
                        "inverse-on-surface": "#303038",
                        "on-tertiary-fixed-variant": "#920027",
                        "surface-container-lowest": "#0e0d15",
                        "secondary-fixed-dim": "#ffb955",
                        "outline": "#87929b",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb3b5",
                        "surface-variant": "#34343c",
                        "surface-container": "#1f1f27",
                        "secondary": "#ffb955",
                        "primary-container": "#00bfff",
                        "on-primary-fixed-variant": "#004c69",
                        "primary": "#8fd6ff",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "tertiary-fixed": "#ffdada",
                        "on-tertiary-fixed": "#40000c",
                        "on-surface": "#e4e1ec",
                        "inverse-primary": "#00668a",
                        "surface-container-high": "#2a2931",
                        "on-tertiary-container": "#8d0025",
                        "on-primary-container": "#004a65",
                        "on-tertiary": "#680019",
                        "on-background": "#e4e1ec",
                        "surface-container-highest": "#34343c",
                        "surface": "#13131a",
                        "surface-tint": "#7ad0ff",
                        "on-primary": "#003549",
                        "surface-bright": "#393841",
                        "secondary-container": "#dc9100",
                        "primary-fixed": "#c3e8ff",
                        "inverse-surface": "#e4e1ec",
                        "on-secondary-fixed": "#291800",
                        "on-secondary": "#452b00",
                        "surface-container-low": "#1b1b23",
                        "on-secondary-fixed-variant": "#633f00",
                        "on-surface-variant": "#bcc8d1",
                        "outline-variant": "#3d4850",
                        "surface-dim": "#13131a",
                        "primary-fixed-dim": "#7ad0ff",
                        "secondary-fixed": "#ffddb4",
                        "tertiary": "#ffbdbf",
                        "on-error": "#690005"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "mono": ["Space Mono"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .light .glass-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .step-pulse {
            box-shadow: 0 0 0 4px rgba(0, 191, 255, 0.2);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container/30">
<!-- SideNavBar (72px fixed) -->
<nav class="fixed left-0 top-0 h-full w-[72px] bg-[#08080F]/80 backdrop-blur-xl flex flex-col items-center py-6 gap-8 z-50 shadow-[40px_0_40px_rgba(0,0,0,0.06)]">
<!-- Brand Logo -->
<div class="text-xl font-bold text-[#8fd6ff] font-headline tracking-tight">KC</div>
<!-- Main Nav -->
<div class="flex flex-col gap-6 items-center flex-1">
<button class="w-12 h-12 flex items-center justify-center text-[#bcc8d1] hover:bg-white/5 transition-all duration-300 scale-95 active:scale-90">
<span class="material-symbols-outlined">home</span>
</button>
<button class="w-12 h-12 flex items-center justify-center text-[#bcc8d1] hover:bg-white/5 transition-all duration-300 scale-95 active:scale-90">
<span class="material-symbols-outlined">mic_external_on</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-[#1A1A24] text-[#FFD700] border-l-2 border-[#FFD700] transition-all duration-300 scale-95 active:scale-90">
<span class="material-symbols-outlined">book_online</span>
</button>
<button class="w-12 h-12 flex items-center justify-center text-[#bcc8d1] hover:bg-white/5 transition-all duration-300 scale-95 active:scale-90">
<span class="material-symbols-outlined">calendar_today</span>
</button>
<button class="w-12 h-12 flex items-center justify-center text-[#bcc8d1] hover:bg-white/5 transition-all duration-300 scale-95 active:scale-90">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
<!-- User & Global Controls -->
<div class="flex flex-col gap-6 items-center">
<button class="text-[#bcc8d1] hover:text-[#8fd6ff] transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<div class="relative">
<img alt="User avatar with cyan ring" class="w-10 h-10 rounded-full border-2 border-primary-container object-cover" data-alt="Close-up portrait of a stylish woman with neon blue rim lighting reflecting on her face and hair" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCQFIVwRQfOqY83k6QHn4TgMIeUQbIPHQ4_-sH5ReionGdVAdannDJpmw19pfPilDIBvTcbZFASjKx0VhtXx6inTkZzTVnXYhC38BKNFmXqMKt-s4EVi1z0jB36AdHWOpjy1P341SiMsK-YyKrw86JKJMVsuEUNzDGxnQuglaMSs1vQbQ2sGb8BE147Rp_Hz8cfyJc9l7e11iwIcG2h7b6Z8Bfxyd_da6PeUHRzURQZo9P0GtEjOaoiKKXyMtEUYGONfwlPNUh4awac"/>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="ml-[72px] min-h-screen pt-12 px-6">
<div class="max-w-[700px] mx-auto">
<!-- Header Section -->
<header class="mb-10 flex justify-between items-end">
<div>
<h1 class="text-[32px] font-headline font-semibold text-on-surface tracking-tight leading-none mb-2">Book the DJ</h1>
<p class="text-sm text-on-surface-variant font-body">Reserve your date and customize your sonic experience.</p>
</div>
<!-- Light Mode Toggle Mockup -->
<div class="hidden lg:flex items-center gap-3 bg-surface-container-low p-2 rounded-lg border border-outline-variant/10">
<span class="text-[10px] font-mono uppercase tracking-widest text-on-surface-variant">Theme Hint</span>
<div class="flex gap-1">
<div class="w-4 h-4 rounded-full bg-background border border-primary"></div>
<div class="w-4 h-4 rounded-full bg-[#F4F6FA] border border-outline-variant"></div>
</div>
</div>
</header>
<!-- 3-Step Indicator -->
<nav class="relative flex justify-between items-center mb-12 px-4">
<!-- Connecting Line Base -->
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-surface-container-highest -translate-y-1/2 z-0"></div>
<!-- Connecting Line Active (up to Step 1) -->
<div class="absolute top-1/2 left-0 w-[15%] h-[2px] bg-primary-container -translate-y-1/2 z-0"></div>
<!-- Step 1 (Active) -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center step-pulse ring-4 ring-primary-container/20">
<span class="text-[12px] font-bold text-on-primary-container">1</span>
</div>
<span class="text-[10px] font-mono uppercase tracking-widest text-primary">Details</span>
</div>
<!-- Step 2 -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant bg-surface flex items-center justify-center">
<span class="text-[12px] font-bold text-on-surface-variant">2</span>
</div>
<span class="text-[10px] font-mono uppercase tracking-widest text-on-surface-variant">Vibe</span>
</div>
<!-- Step 3 -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full border-2 border-outline-variant bg-surface flex items-center justify-center">
<span class="text-[12px] font-bold text-on-surface-variant">3</span>
</div>
<span class="text-[10px] font-mono uppercase tracking-widest text-on-surface-variant">Payment</span>
</div>
</nav>
<!-- Step 1 Card: EVENT DETAILS -->
<section class="glass-card rounded-2xl p-8 shadow-2xl">
<div class="flex items-center gap-3 mb-8">
<span class="material-symbols-outlined text-primary">event_note</span>
<h2 class="text-xl font-headline font-medium text-on-surface">Event Details</h2>
</div>
<form class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-[12px] font-medium font-body text-on-surface-variant px-1">Full Name</label>
<input class="bg-[#16161F] border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-all" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="text-[12px] font-medium font-body text-on-surface-variant px-1">Email Address</label>
<input class="bg-[#16161F] border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-all" placeholder="john@example.com" type="email"/>
</div>
<!-- Phone -->
<div class="flex flex-col gap-2">
<label class="text-[12px] font-medium font-body text-on-surface-variant px-1">Phone Number</label>
<input class="bg-[#16161F] border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Event Type -->
<div class="flex flex-col gap-2">
<label class="text-[12px] font-medium font-body text-on-surface-variant px-1">Event Type</label>
<select class="bg-[#16161F] border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-all appearance-none">
<option>Private Party</option>
<option>Wedding</option>
<option>Corporate Gala</option>
<option>Club Set</option>
</select>
</div>
<!-- Date -->
<div class="flex flex-col gap-2">
<label class="text-[12px] font-medium font-body text-on-surface-variant px-1">Event Date</label>
<input class="bg-[#16161F] border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-all" type="date"/>
</div>
<!-- Guest Count -->
<div class="flex flex-col gap-2">
<label class="text-[12px] font-medium font-body text-on-surface-variant px-1">Guest Count</label>
<input class="bg-[#16161F] border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-all" placeholder="50+" type="number"/>
</div>
</div>
<!-- Full Width: Venue -->
<div class="flex flex-col gap-2">
<label class="text-[12px] font-medium font-body text-on-surface-variant px-1">Venue Address</label>
<input class="bg-[#16161F] border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-all" placeholder="123 Rhythm Street, Sound City" type="text"/>
</div>
<!-- Full Width: Notes -->
<div class="flex flex-col gap-2">
<label class="text-[12px] font-medium font-body text-on-surface-variant px-1">Additional Notes</label>
<textarea class="bg-[#16161F] border border-outline-variant/30 rounded-lg px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-all resize-none" placeholder="Tell us about the vibe, special requests, or equipment available..." rows="4"></textarea>
</div>
<!-- Actions -->
<div class="flex justify-end pt-4">
<button class="bg-primary-container text-on-primary-container px-8 py-3 rounded-lg font-semibold flex items-center gap-2 hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(0,191,255,0.3)]" type="button">
                            Continue
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</section>
</div>
</main>
<!-- BottomNavBar (Global Player Bar) -->
</body></html>
