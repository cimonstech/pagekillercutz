<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KillerCutz — Verify Email</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&amp;family=Space+Grotesk:wght@600&amp;family=Inter:wght@400;500&amp;family=Space+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#004a65",
              "surface-variant": "#34343c",
              "primary-container": "#00bfff",
              "outline-variant": "#3d4850",
              "on-primary-fixed": "#001e2c",
              "inverse-primary": "#00668a",
              "secondary-fixed-dim": "#ffb955",
              "secondary-container": "#dc9100",
              "surface-bright": "#393841",
              "tertiary-fixed": "#ffdada",
              "on-secondary-fixed-variant": "#633f00",
              "on-tertiary-fixed": "#40000c",
              "on-tertiary-container": "#8d0025",
              "inverse-surface": "#e4e1ec",
              "error-container": "#93000a",
              "surface-container-low": "#1b1b23",
              "primary": "#8fd6ff",
              "surface-dim": "#13131a",
              "surface-container-high": "#2a2931",
              "background": "#13131a",
              "secondary": "#ffb955",
              "surface-container-highest": "#34343c",
              "tertiary-container": "#ff9399",
              "primary-fixed-dim": "#7ad0ff",
              "on-surface-variant": "#bcc8d1",
              "surface-container": "#1f1f27",
              "outline": "#87929b",
              "on-secondary-fixed": "#291800",
              "on-primary-fixed-variant": "#004c69",
              "surface": "#13131a",
              "secondary-fixed": "#ffddb4",
              "on-secondary-container": "#4f3100",
              "on-primary": "#003549",
              "on-surface": "#e4e1ec",
              "inverse-on-surface": "#303038",
              "error": "#ffb4ab",
              "surface-tint": "#7ad0ff",
              "surface-container-lowest": "#0e0d15",
              "on-secondary": "#452b00",
              "tertiary-fixed-dim": "#ffb3b5",
              "on-tertiary": "#680019",
              "on-error-container": "#ffdad6",
              "tertiary": "#ffbdbf",
              "on-background": "#e4e1ec",
              "on-tertiary-fixed-variant": "#920027",
              "on-error": "#690005",
              "primary-fixed": "#c3e8ff"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Space Mono"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .bg-sonic-gradient {
            background: radial-gradient(circle at 50% 50%, #1f1f27 0%, #13131a 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary-fixed min-h-screen flex items-center justify-center p-6 bg-sonic-gradient">
<!-- Email Verification Card -->
<div class="glass-panel w-full max-w-[460px] rounded-[24px] p-10 flex flex-col items-center text-center relative overflow-hidden">
<!-- Ambient Glow behind Icon -->
<div class="absolute -top-10 left-1/2 -translate-x-1/2 w-32 h-32 bg-primary-container/10 blur-3xl rounded-full"></div>
<!-- Animated Icon -->
<div class="mb-8 animate-float">
<div class="w-20 h-20 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[64px] text-primary-container" data-icon="mail">mail</span>
</div>
</div>
<!-- Headline -->
<h1 class="font-headline text-[24px] text-white mb-2">Verify your email</h1>
<!-- Text Content -->
<p class="text-on-surface-variant text-[14px] leading-relaxed">
            We've sent a verification link to:
        </p>
<div class="my-3 py-1 px-4 bg-surface-container-low rounded-sm">
<span class="font-label text-[15px] text-primary-container">dj_vortex_99@killercutz.fm</span>
</div>
<p class="text-on-surface-variant text-[13px] leading-relaxed mb-8 max-w-[300px]">
            Check your inbox and click the link to activate your account.
        </p>
<!-- Divider -->
<div class="w-full h-[1px] bg-outline-variant/20 mb-8"></div>
<!-- Action Links -->
<div class="flex flex-col gap-5 w-full">
<button class="flex items-center justify-center gap-2 text-primary-container font-medium hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined text-[18px]" data-icon="refresh">refresh</span>
<span class="text-[14px]">Resend verification email</span>
</button>
<button class="text-on-surface-variant hover:text-on-surface text-[14px] transition-colors duration-200">
                Change email address
            </button>
<button class="flex items-center justify-center gap-2 text-on-surface-variant hover:text-on-surface text-[14px] transition-colors duration-200 mt-2">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
                Back to Sign In
            </button>
</div>
<!-- Expiry Note -->
<div class="mt-10">
<span class="font-label text-[10px] text-on-surface-variant tracking-wider uppercase opacity-60">
                Link expires in 24 hours.
            </span>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10">
<div class="absolute top-[10%] right-[15%] w-[400px] h-[400px] bg-primary-container/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[10%] left-[10%] w-[300px] h-[300px] bg-secondary/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
