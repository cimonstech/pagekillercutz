<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&amp;family=Space+Grotesk:wght@600&amp;family=Inter:wght@400;500&amp;family=Space+Mono&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
        }
        .hero-font {
            font-family: 'Barlow Condensed', sans-serif;
        }
        .mono-font {
            font-family: 'Space Mono', monospace;
        }
        /* No-Line Rule: boundaries felt, not seen */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .hardware-gradient {
            background: linear-gradient(135deg, #8fd6ff 0%, #00bfff 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "surface-tint": "#7ad0ff",
                        "on-primary-container": "#004a65",
                        "secondary": "#ffb955",
                        "error-container": "#93000a",
                        "tertiary": "#ffbdbf",
                        "surface-container-low": "#1b1b23",
                        "surface-container": "#1f1f27",
                        "surface": "#13131a",
                        "primary": "#8fd6ff",
                        "on-tertiary-container": "#8d0025",
                        "inverse-primary": "#00668a",
                        "surface-bright": "#393841",
                        "on-error": "#690005",
                        "surface-variant": "#34343c",
                        "on-primary-fixed-variant": "#004c69",
                        "surface-container-highest": "#34343c",
                        "outline-variant": "#3d4850",
                        "on-surface": "#e4e1ec",
                        "primary-container": "#00bfff",
                        "on-surface-variant": "#bcc8d1",
                        "surface-dim": "#13131a",
                        "on-secondary-container": "#4f3100",
                        "inverse-on-surface": "#303038",
                        "secondary-fixed": "#ffddb4",
                        "on-tertiary-fixed": "#40000c",
                        "on-primary": "#003549",
                        "tertiary-fixed-dim": "#ffb3b5",
                        "secondary-container": "#dc9100",
                        "on-tertiary-fixed-variant": "#920027",
                        "on-primary-fixed": "#001e2c",
                        "background": "#13131a",
                        "tertiary-fixed": "#ffdada",
                        "tertiary-container": "#ff9399",
                        "on-secondary-fixed-variant": "#633f00",
                        "outline": "#87929b",
                        "on-tertiary": "#680019",
                        "primary-fixed-dim": "#7ad0ff",
                        "surface-container-high": "#2a2931",
                        "on-secondary-fixed": "#291800",
                        "on-background": "#e4e1ec",
                        "surface-container-lowest": "#0e0d15",
                        "secondary-fixed-dim": "#ffb955",
                        "primary-fixed": "#c3e8ff",
                        "on-secondary": "#452b00",
                        "inverse-surface": "#e4e1ec"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem", "3xl": "1.5rem"},
                },
            },
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Atmospheric Background -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
<main class="relative z-10 w-full max-w-[440px]">
<!-- STEP 2: Email Sent -->
<section class="glass-card p-12 shadow-[0_40px_40px_rgba(0,0,0,0.06)] flex flex-col items-center rounded-3xl" id="step-2">
<div class="w-[52px] h-[52px] rounded-full bg-primary/10 flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="mail">mail</span>
</div>
<h2 class="text-[22px] font-semibold mb-3 text-white text-center leading-tight">Check your email.</h2>
<p class="text-on-surface-variant text-sm mb-10 text-center leading-relaxed">
                We've sent a reset link to <br/>
<span class="mono-font text-primary font-medium tracking-tight">dj.pulse@killercutz.fm</span>
</p>
<div class="flex flex-col items-center gap-6">
<button class="text-primary text-sm font-medium hover:underline flex items-center gap-2 transition-all">
                    Didn't receive it? Resend
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<a class="text-on-surface-variant/60 text-sm hover:text-on-surface transition-colors flex items-center gap-2" href="#">
                    Back to Sign In
                </a>
</div>
</section>
</main>
<!-- Branding Footer (Floating Editorial Style) -->
<div class="fixed bottom-8 left-8 hidden lg:block">
<div class="hero-font text-6xl text-white/5 font-black uppercase leading-none select-none">
            Sonic<br/>Futurism
        </div>
</div>
<div class="fixed top-8 right-8 hidden lg:block">
<div class="mono-font text-[10px] text-primary/40 flex flex-col items-end uppercase tracking-[0.2em]">
<span>System Reset Protocol</span>
<span>Ref: KC-440-PWD</span>
</div>
</div>
</body></html>
