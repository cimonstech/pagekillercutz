<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KillerCutz | Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=Space+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#1f1f27",
              "primary-fixed-dim": "#7ad0ff",
              "surface": "#13131a",
              "on-error": "#690005",
              "surface-variant": "#34343c",
              "on-tertiary-fixed-variant": "#920027",
              "surface-container-low": "#1b1b23",
              "inverse-on-surface": "#303038",
              "tertiary-fixed": "#ffdada",
              "surface-container-high": "#2a2931",
              "primary": "#8fd6ff",
              "on-surface-variant": "#bcc8d1",
              "on-secondary": "#452b00",
              "on-surface": "#e4e1ec",
              "on-secondary-fixed": "#291800",
              "primary-fixed": "#c3e8ff",
              "tertiary": "#ffbdbf",
              "outline": "#87929b",
              "secondary-container": "#dc9100",
              "on-primary-fixed": "#001e2c",
              "secondary": "#ffb955",
              "tertiary-fixed-dim": "#ffb3b5",
              "surface-container-highest": "#34343c",
              "on-tertiary-fixed": "#40000c",
              "surface-bright": "#393841",
              "on-tertiary": "#680019",
              "surface-container-lowest": "#0e0d15",
              "secondary-fixed-dim": "#ffb955",
              "on-secondary-fixed-variant": "#633f00",
              "on-primary": "#003549",
              "surface-dim": "#13131a",
              "on-background": "#e4e1ec",
              "outline-variant": "#3d4850",
              "error-container": "#93000a",
              "on-secondary-container": "#4f3100",
              "on-primary-fixed-variant": "#004c69",
              "primary-container": "#00bfff",
              "secondary-fixed": "#ffddb4",
              "inverse-surface": "#e4e1ec",
              "background": "#13131a",
              "error": "#ffb4ab",
              "surface-tint": "#7ad0ff",
              "on-primary-container": "#004a65",
              "tertiary-container": "#ff9399",
              "on-tertiary-container": "#8d0025",
              "inverse-primary": "#00668a",
              "on-error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["Space Mono"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vinyl-ring {
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-input:focus {
            border-color: #00bfff;
            background: rgba(255, 255, 255, 0.06);
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 191, 255, 0.2);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen selection:bg-primary-container/30 overflow-x-hidden">
<!-- Background Motif -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<!-- Radial Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-container/10 blur-[120px] rounded-full"></div>
<!-- Vinyl Rings -->
<div class="vinyl-ring w-[400px] h-[400px]"></div>
<div class="vinyl-ring w-[600px] h-[600px]"></div>
<div class="vinyl-ring w-[800px] h-[800px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex items-center justify-center min-h-screen px-6 py-12">
<!-- Centered Registration Card -->
<div class="glass-card w-full max-w-[480px] rounded-[24px] p-8 md:p-10 border border-white/5 shadow-2xl">
<!-- Header Section -->
<header class="flex flex-col items-center mb-10">
<div class="w-12 h-12 bg-primary-container rounded-full flex items-center justify-center mb-6 shadow-[0_0_20px_rgba(0,191,255,0.4)]">
<span class="material-symbols-outlined text-surface text-2xl" data-weight="fill">album</span>
</div>
<h1 class="font-headline font-semibold text-[26px] text-white leading-tight mb-2 tracking-tight">Create Your Account</h1>
<p class="text-on-surface-variant text-[14px] text-center leading-relaxed">Book a DJ, curate your playlist, track your event.</p>
</header>
<!-- Registration Form -->
<form action="#" class="space-y-5">
<!-- Full Name -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-lg">person</span>
<input class="glass-input w-full h-[52px] pl-12 pr-4 rounded-xl text-[14px] text-white placeholder:text-on-surface-variant/40 transition-all" placeholder="Full Name" type="text"/>
</div>
<!-- Email Address -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-lg">mail</span>
<input class="glass-input w-full h-[52px] pl-12 pr-4 rounded-xl text-[14px] text-white placeholder:text-on-surface-variant/40 transition-all" placeholder="Email Address" type="email"/>
</div>
<!-- Phone Number -->
<div class="flex gap-2">
<div class="glass-input px-4 rounded-xl flex items-center gap-2 border border-white/10 shrink-0 h-[52px]">
<span class="material-symbols-outlined text-secondary text-lg" data-weight="fill">flag</span>
<span class="font-mono text-[13px] text-on-surface">+233</span>
</div>
<div class="relative flex-1">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-lg">phone_iphone</span>
<input class="glass-input w-full h-[52px] pl-12 pr-4 rounded-xl text-[14px] text-white placeholder:text-on-surface-variant/40 transition-all" placeholder="Phone Number" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-lg">lock</span>
<input class="glass-input w-full h-[52px] pl-12 pr-12 rounded-xl text-[14px] text-white placeholder:text-on-surface-variant/40 transition-all" placeholder="Password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
<!-- Password Strength -->
<div class="pt-1">
<div class="flex justify-between items-center mb-1.5 px-1">
<span class="font-mono text-[11px] text-on-surface-variant/60 uppercase tracking-widest">Security Strength</span>
<span class="font-mono text-[11px] text-primary-container">Strong</span>
</div>
<div class="flex gap-1 h-1 w-full">
<div class="flex-1 bg-error rounded-full"></div>
<div class="flex-1 bg-secondary rounded-full"></div>
<div class="flex-1 bg-primary-container rounded-full shadow-[0_0_8px_rgba(0,191,255,0.4)]"></div>
</div>
</div>
</div>
<!-- Confirm Password -->
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-lg">enhanced_encryption</span>
<input class="glass-input w-full h-[52px] pl-12 pr-4 rounded-xl text-[14px] text-white placeholder:text-on-surface-variant/40 transition-all" placeholder="Confirm Password" type="password"/>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 px-1 pt-2">
<div class="relative flex items-center justify-center pt-0.5">
<input class="w-5 h-5 rounded-md glass-input border-white/10 text-primary-container focus:ring-offset-surface focus:ring-primary-container cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="text-[13px] text-on-surface-variant leading-relaxed" for="terms">
                        I agree to the <a class="text-primary-container hover:underline underline-offset-4" href="#">Terms of Service</a> and <a class="text-primary-container hover:underline underline-offset-4" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Primary CTA -->
<button class="w-full h-[46px] bg-primary-container text-surface font-headline font-bold uppercase tracking-widest text-[14px] rounded-sm hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group mt-4" type="submit">
                    Create Account
                    <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center my-8">
<div class="flex-grow border-t border-white/5"></div>
<span class="flex-shrink mx-4 font-mono text-[11px] text-on-surface-variant/40 uppercase tracking-[0.2em]">or</span>
<div class="flex-grow border-t border-white/5"></div>
</div>
<!-- Footer Link -->
<footer class="text-center">
<p class="text-[13px] text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary-container font-semibold hover:underline underline-offset-4 ml-1 flex-inline items-center gap-1" href="/login">
                        Sign In <span class="material-symbols-outlined text-[14px] align-middle">arrow_forward</span>
</a>
</p>
</footer>
</div>
</main>
<!-- Decorative Corner Element -->
<div class="fixed bottom-8 right-8 z-20 hidden md:block opacity-20 hover:opacity-100 transition-opacity">
<p class="font-mono text-[10px] text-on-surface-variant uppercase tracking-[0.3em] rotate-90 origin-bottom-right">KillerCutz // Secure Auth v3.0</p>
</div>
</body></html>
