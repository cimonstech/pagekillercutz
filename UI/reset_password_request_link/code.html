<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&amp;family=Space+Grotesk:wght@600&amp;family=Inter:wght@400;500&amp;family=Space+Mono&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
        }
        .hero-font {
            font-family: 'Barlow Condensed', sans-serif;
        }
        .mono-font {
            font-family: 'Space Mono', monospace;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .hardware-gradient {
            background: linear-gradient(135deg, #8fd6ff 0%, #00bfff 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "surface-tint": "#7ad0ff",
                        "on-primary-container": "#004a65",
                        "secondary": "#ffb955",
                        "error-container": "#93000a",
                        "tertiary": "#ffbdbf",
                        "surface-container-low": "#1b1b23",
                        "surface-container": "#1f1f27",
                        "surface": "#13131a",
                        "primary": "#8fd6ff",
                        "on-tertiary-container": "#8d0025",
                        "inverse-primary": "#00668a",
                        "surface-bright": "#393841",
                        "on-error": "#690005",
                        "surface-variant": "#34343c",
                        "on-primary-fixed-variant": "#004c69",
                        "surface-container-highest": "#34343c",
                        "outline-variant": "#3d4850",
                        "on-surface": "#e4e1ec",
                        "primary-container": "#00bfff",
                        "on-surface-variant": "#bcc8d1",
                        "surface-dim": "#13131a",
                        "on-secondary-container": "#4f3100",
                        "inverse-on-surface": "#303038",
                        "secondary-fixed": "#ffddb4",
                        "on-tertiary-fixed": "#40000c",
                        "on-primary": "#003549",
                        "tertiary-fixed-dim": "#ffb3b5",
                        "secondary-container": "#dc9100",
                        "on-tertiary-fixed-variant": "#920027",
                        "on-primary-fixed": "#001e2c",
                        "background": "#13131a",
                        "tertiary-fixed": "#ffdada",
                        "tertiary-container": "#ff9399",
                        "on-secondary-fixed-variant": "#633f00",
                        "outline": "#87929b",
                        "on-tertiary": "#680019",
                        "primary-fixed-dim": "#7ad0ff",
                        "surface-container-high": "#2a2931",
                        "on-secondary-fixed": "#291800",
                        "on-background": "#e4e1ec",
                        "surface-container-lowest": "#0e0d15",
                        "secondary-fixed-dim": "#ffb955",
                        "primary-fixed": "#c3e8ff",
                        "on-secondary": "#452b00",
                        "inverse-surface": "#e4e1ec"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "2xl": "1.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
</head>
<body class="bg-[#0a0a0f] text-on-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Atmospheric Background Gradient -->
<div class="fixed inset-0 z-0 pointer-events-none bg-gradient-to-b from-[#13131a] to-[#0a0a0f]">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-container/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 blur-[120px] rounded-full"></div>
</div>
<main class="relative z-10 w-full max-w-[440px]">
<!-- STEP 1: Request Reset -->
<section class="glass-card p-10 rounded-2xl shadow-[0_40px_60px_rgba(0,0,0,0.5)] flex flex-col items-center" id="step-1">
<!-- Vinyl Logo Mark -->
<div class="mb-8 w-8 h-8 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[32px] leading-none" data-icon="album" style="font-variation-settings: 'FILL' 1;">album</span>
</div>
<h1 class="text-[24px] font-semibold mb-2 text-white text-center leading-tight">Reset Your Password</h1>
<p class="text-on-surface-variant text-[14px] mb-8 text-center leading-relaxed">Enter your email. We'll send a reset link.</p>
<form class="w-full space-y-6">
<div>
<label class="block text-[10px] font-medium text-on-surface-variant uppercase tracking-[0.15em] mb-2 px-1">Email Address</label>
<input class="w-full bg-white/[0.03] border border-white/[0.05] focus:ring-1 focus:ring-primary focus:border-primary text-on-surface py-3 px-4 rounded-sm transition-all outline-none placeholder:text-on-surface-variant/30" placeholder="name@domain.com" type="email"/>
</div>
<button class="w-full hardware-gradient text-on-primary font-bold h-[46px] rounded-sm flex items-center justify-center gap-2 group transition-all active:scale-[0.98] shadow-[0_4px_16px_rgba(0,191,255,0.25)]" type="submit">
                    Send Reset Link
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<a class="mt-8 text-on-surface-variant text-sm font-medium hover:text-white transition-colors flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-lg" data-icon="west">west</span>
                Back to Sign In
            </a>
</section>
</main>
<!-- Branding Accents -->
<div class="fixed bottom-8 left-8 hidden lg:block pointer-events-none">
<div class="hero-font text-6xl text-white/[0.02] font-black uppercase leading-none select-none">
            Sonic<br/>Futurism
        </div>
</div>
<div class="fixed top-8 right-8 hidden lg:block pointer-events-none">
<div class="mono-font text-[10px] text-primary/20 flex flex-col items-end uppercase tracking-[0.2em]">
<span>System Reset Protocol</span>
<span>Ref: KC-440-PWD</span>
</div>
</div>
</body></html>
